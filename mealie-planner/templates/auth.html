<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1c1b19">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ ingress_path }}/favicon.ico" sizes="any">
  <title>{{ translations.auth.pageTitle if translations.auth is defined else 'Mealie Planner · Unlock' }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          oklch(11% 0 0);
      --surface:     oklch(16% 0.004 70);
      --border:      oklch(30% 0.004 70);
      --border-focus:oklch(60% 0.11 275);
      --accent:      oklch(60% 0.11 275);
      --on-accent:   oklch(98% 0.002 70);
      --text:        oklch(93% 0.004 70);
      --text-subtle: oklch(57% 0.006 70);
      --text-muted:  oklch(38% 0.005 70);
      --error:       oklch(58% 0.22 28);
      --meal-bf:     oklch(74% 0.13 68);
      --meal-lu:     oklch(67% 0.15 142);
      --meal-di:     oklch(60% 0.20 15);
      --meal-si:     oklch(64% 0.11 195);
      --radius:      10px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:          oklch(98% 0.004 70);
        --surface:     oklch(95% 0.005 70);
        --border:      oklch(82% 0.004 70);
        --border-focus:oklch(42% 0.12 275);
        --accent:      oklch(42% 0.12 275);
        --on-accent:   oklch(98% 0.002 70);
        --text:        oklch(16% 0.006 70);
        --text-subtle: oklch(46% 0.007 70);
        --text-muted:  oklch(70% 0.005 70);
        --error:       oklch(42% 0.25 25);
        --meal-bf:     oklch(50% 0.16 65);
        --meal-lu:     oklch(44% 0.18 142);
        --meal-di:     oklch(44% 0.22 15);
        --meal-si:     oklch(46% 0.13 195);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      font-optical-sizing: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .card__icon {
      width: 52px;
      height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .card__text {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .sub {
      font-size: 0.875rem;
      color: var(--text-subtle);
      line-height: 1.55;
    }

    .boxes {
      display: flex;
      gap: 8px;
    }

    .box {
      width: 44px;
      height: 52px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1.25rem;
      font-weight: 600;
      font-family: inherit;
      text-align: center;
      color: var(--text);
      caret-color: var(--accent);
      outline: none;
      transition: border-color 0.15s;
      text-transform: uppercase;
    }

    .box:focus {
      border-color: var(--border-focus);
    }

    .box:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .box--filled {
      border-color: oklch(from var(--border) calc(l + 0.08) c h);
    }

    .btn {
      width: 100%;
      height: 46px;
      background: var(--accent);
      color: var(--on-accent);
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: -0.01em;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.88;
    }

    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .error {
      font-size: 0.8125rem;
      color: var(--error);
      text-align: center;
      min-height: 1.2em;
    }

    .meal-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .meal-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      opacity: 0.4;
    }

    .meal-dots span:nth-child(1) { background: var(--meal-bf); }
    .meal-dots span:nth-child(2) { background: var(--meal-lu); }
    .meal-dots span:nth-child(3) { background: var(--meal-di); }
    .meal-dots span:nth-child(4) { background: var(--meal-si); }
  </style>
</head>
<body>
  <div class="card">

    <div class="card__icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <div class="card__text">
      <h1>{{ translations.auth.title if translations.auth is defined else 'Enter PIN' }}</h1>
      <p class="sub">{{ translations.auth.subtitle if translations.auth is defined else 'Enter your PIN to unlock Mealie Planner.' }}</p>
    </div>

    <div class="boxes" id="boxes">
      <input class="box" type="text" maxlength="1" inputmode="text" autocomplete="off" data-index="0">
      <input class="box" type="text" maxlength="1" inputmode="text" autocomplete="off" data-index="1">
      <input class="box" type="text" maxlength="1" inputmode="text" autocomplete="off" data-index="2">
      <input class="box" type="text" maxlength="1" inputmode="text" autocomplete="off" data-index="3">
      <input class="box" type="text" maxlength="1" inputmode="text" autocomplete="off" data-index="4">
      <input class="box" type="text" maxlength="1" inputmode="text" autocomplete="off" data-index="5">
    </div>

    <p class="error" id="error" aria-live="polite"></p>

    <button class="btn" id="btn" type="button">{{ translations.auth.btn if translations.auth is defined else 'Unlock' }}</button>

    <div class="meal-dots">
      <span></span><span></span><span></span><span></span>
    </div>

  </div>

  <script>
    window._AUTH_TR = {{ translations.auth | tojson if translations.auth is defined else '{}' }};
  </script>
  <script>
    const boxes = Array.from(document.querySelectorAll('.box'));
    const btn = document.getElementById('btn');
    const err = document.getElementById('error');
    const params = new URLSearchParams(location.search);
    const raw = params.get('from') || '/';
    const from = raw.startsWith('/') && !raw.includes('://') ? raw : '/';

    boxes[0].focus();

    function updateFilled() {
      boxes.forEach(b => b.classList.toggle('box--filled', b.value.length > 0));
    }

    boxes.forEach((box, i) => {
      box.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^a-zA-Z0-9]/g, '').slice(-1);
        e.target.value = val;
        updateFilled();
        if (val && i < 5) boxes[i + 1].focus();
        if (i === 5 && val) attempt();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) {
          boxes[i - 1].focus();
          boxes[i - 1].value = '';
          updateFilled();
        }
      });
      box.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/[^a-zA-Z0-9]/g, '').slice(0, 6);
        text.split('').forEach((ch, j) => { if (boxes[j]) boxes[j].value = ch; });
        updateFilled();
        if (text.length === 6) attempt();
      });
    });

    btn.addEventListener('click', attempt);

    async function attempt() {
      const pin = boxes.map(b => b.value).join('');
      const _tr = (k) => window._AUTH_TR?.[k] ?? null;
      if (pin.length < 6) { err.textContent = _tr('errorShort') || 'Enter all 6 characters.'; return; }
      btn.disabled = true;
      err.textContent = '';
      try {
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin }),
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.detail || _tr('errorIncorrect') || 'Incorrect PIN.';
          boxes.forEach(b => { b.value = ''; b.classList.remove('box--filled'); });
          boxes[0].focus();
          btn.disabled = false;
          return;
        }
        window.location.href = from;
      } catch {
        err.textContent = _tr('errorNetwork') || 'Network error. Try again.';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>

name: Pull Request Checks

on:
  pull_request:
    branches:
      - main


jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mealie-planner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: mealie-planner/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test
        run: python -m pytest tests/ -v
